<!doctype html>
<html lang="en" style="background:transparent">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZeeKota Multi Job</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:transparent">
    <div id="zk-app" class="zk-app zk-hidden" style="display:none" aria-live="polite">
        <section class="zk-shell" role="dialog" aria-modal="true" aria-labelledby="zk-title">
            <header class="zk-header">
                <div class="zk-brand">
                    <img id="zk-logo" class="zk-logo" alt="" draggable="false">
                    <div class="zk-brand-copy">
                        <span id="zk-server" class="zk-server"></span>
                        <span id="zk-subtitle" class="zk-subtitle"></span>
                    </div>
                </div>
                <div class="zk-title-block">
                    <h1 id="zk-title"></h1>
                    <span id="zk-character" class="zk-character"></span>
                </div>
                <button id="zk-close" class="zk-icon-button" type="button" aria-label="Close">
                    <span aria-hidden="true">X</span>
                </button>
            </header>
            <main id="zk-content" class="zk-content"></main>
            <footer class="zk-footer">
                <span id="zk-footer-text"></span>
                <span id="zk-version"></span>
            </footer>
        </section>
        <aside id="zk-toasts" class="zk-toasts" aria-live="polite"></aside>
        <div id="zk-modal" class="zk-modal zk-hidden" role="dialog" aria-modal="true"></div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/player.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
